services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres-dev
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lms-backend-dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      BACKEND_PORT: ${BACKEND_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json:ro
      - ./backend/nodemon.json:/app/nodemon.json:ro
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lms-frontend-dev
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: ${FRONTEND_PORT}
      INTERNAL_API_URL: http://backend:${BACKEND_PORT}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      - backend
    networks:
      - lms_network

  nginx:
    image: nginx:1.27-alpine
    container_name: lms-nginx-dev
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lms_network

volumes:
  postgres_data_dev:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:

networks:
  lms_network:
    driver: bridge
